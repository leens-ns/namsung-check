name: Deploy Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-hosting-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: namsung-check
          workload_identity_provider: projects/36959618515/locations/global/workloadIdentityPools/github/providers/namsung-check-v2
          service_account: github-attendance-reminder@namsung-check.iam.gserviceaccount.com
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Deploy Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
          GOOGLE_CLOUD_PROJECT: namsung-check
        run: npx --yes firebase-tools@15.17.0 deploy --only hosting --project namsung-check --non-interactive
