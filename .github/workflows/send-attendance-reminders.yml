name: Send attendance reminders

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: attendance-reminders
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: namsung-check
          workload_identity_provider: projects/36959618515/locations/global/workloadIdentityPools/github/providers/namsung-check
          service_account: github-attendance-reminder@namsung-check.iam.gserviceaccount.com
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node automation/send-reminders.mjs
        env:
          GCP_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          FIREBASE_PROJECT_ID: namsung-check
          APP_URL: https://leens-ns.github.io/namsung-check/
